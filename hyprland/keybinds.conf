$mainMod = SUPER                    

#  ___  ___ ___ ___ ___ _  _ ___ _  _  ___ _____ ___ 
# / __|/ __| _ \ __| __| \| / __| || |/ _ \_   _/ __|
# \__ \ (__|   / _|| _|| .` \__ \ __ | (_) || | \__ \
# |___/\___|_|_\___|___|_|\_|___/_||_|\___/ |_| |___/
                                              
bind = CTRL SHIFT, 1, exec, hyprshot -m region --clipboard-only
bind = CTRL SHIFT, 2, exec, hyprshot -m window --clipboard-only
bind = CTRL SHIFT, 3, exec, hyprshot -m output --clipboard-only

#  ___ ___  ___   ___ ___    _   __  __ ___ 
# | _ \ _ \/ _ \ / __| _ \  /_\ |  \/  / __|
# |  _/   / (_) | (_ |   / / _ \| |\/| \__ \
# |_| |_|_\\___/ \___|_|_\/_/ \_\_|  |_|___/
                                           
bind = $mainMod, RETURN, exec, alacritty # Terminal
bind = $mainMod, E, exec, thunar # File Explorer
bind = $mainMod, B, exec, firefox # Browser
bind = $mainMod, P, exec, codium # VSCodium
bind = $mainMod, M, exec, thunderbird # Thunderbird
bind = $mainMod, M, exec, smile	 # Emoji Picker
bind = $mainMod CTRL, W, exec, waypaper # Wallpaper Selector

# __      _____ _  _ ___   _____      _____ 
# \ \    / /_ _| \| |   \ / _ \ \    / / __|
#  \ \/\/ / | || .` | |) | (_) \ \/\/ /\__ \
#   \_/\_/ |___|_|\_|___/ \___/ \_/\_/ |___/

bind = $mainMod, Q, killactive 	# Kill active window
bind = $mainMod, F, fullscreen 	# Set active window to fullscreen
bind = $mainMod, T, togglefloating # Toggle active windows into floating mode
bind = $mainMod, J, togglesplit # Toggle split
bind = $mainMod, K, swapsplit # Swapsplit
bind = $mainMod, left, movefocus, l # Move focus left
bind = $mainMod, right, movefocus, r # Move focus right
bind = $mainMod, up, movefocus, u # Move focus up
bind = $mainMod, down, movefocus, d # Move focus down
bindm = $mainMod, mouse:272, movewindow # Move window with the mouse
bindm = $mainMod, mouse:273, resizewindow # Resize window with the mouse
