[Settings]
language = en
folder = ~/Pictures/wallpapers
monitors = All
wallpaper = ~/Pictures/wallpapers/wallhaven-ex59dr.jpg
backend = hyprpaper
fill = fill
sort = name
color = #ffffff
subfolders = False
show_hidden = False
show_gifs_only = False
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 90
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
use_xdg_state = False
post_command = wal -i $wallpaper && ~/.config/waybar/scripts/waybar-restart.sh && ~/.config/waypaper/spicetify_colors.sh

